spring.application.name=we-play-back-end

# Server Configuration - Load from environment variable, default to 8081
server.port=${SERVER_PORT:8081}

# MongoDB Configuration - Load from environment variables
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/weplay}
spring.mongodb.database=${MONGODB_DATABASE:weplay}

# CORS Configuration (VERY IMPORTANT!)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JWT Configuration - Use a proper 64+ byte secret for HS512
jwt.secret=${JWT_SECRET:cG0zV2VQbGF5QXBwU2VjcmV0S2V5Rm9yRGV2ZWxvcG1lbnRPbmx5VGhpc011c3RCZUNoYW5nZWRJblByb2R1Y3Rpb24xMjM0NTY3ODkw}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.weplay=${LOGGING_LEVEL_COM_WEPLAY:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:DEBUG}

# Environment identifier
app.environment=${ENVIRONMENT:development}